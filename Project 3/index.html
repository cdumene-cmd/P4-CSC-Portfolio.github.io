<!DOCTYPE HTML>
<html>
<head>
<title>Music Player</title>
<style>
 body {
        background:url("images/headphones.jpg");;
        background-size: cover;
        background-repeat: no-repeat;
        background-position: center;
    }
  #cp {
        width: 600px;
        margin: 100px auto 0;
        text-align: center;
    }
  button {
        background-color: #738374;
        padding: 10px;
        font-size: 10px;
        border: none;
        width: 100px;
        color: white;
        cursor: pointer;
        margin: 5px;
    }

    #message {
        font-weight: bold;
        color: #1d4ac5;
        margin-top: 20px;
    }  
</style>
<script src="https://code.jquery.com/jquery.min.js"></script>
<script src="app.js"></script>
</head>
<body>
  <!-- Control Panel will go here -->
<div id="cp">
  <button id="play">Play</button>
  <button id="stop">Stop</button>
    <button id="pause">Pause</button>
    <button id="mute">Mute</button>
    <button id="unmute">Unmute</button>
    <button id="volUp">Volume Up</button>
    <button id="volDown">Volume Down</button>

  <p id="message">Waiting</p>  
</div>
  <!-- Audio player will go here -->
   <audio id="player">
  <source src="Project%203/music/Song1.mp3" type="audio/mpeg">
</audio>
</body>
</html>
